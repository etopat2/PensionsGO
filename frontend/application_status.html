<body>
  <header id="dynamicHeader"></header>

  <main class="main-wrapper">
    <section class="track-section">
      <div class="track-header">
        <h2>Application Progress Tracker</h2>
        <p>Search by file number, pensioner name, or phone number to view workflow progress and step details.</p>
      </div>

      <form id="trackForm" class="track-form">
        <input type="text" id="trackingId" placeholder="Enter file number, name, or phone" autocomplete="off">
        <button type="submit" class="btn-secondary">Track</button>
      </form>

      <div class="track-legend">
        <span class="legend-item"><i class="legend-dot done"></i> Completed</span>
        <span class="legend-item"><i class="legend-dot current"></i> In Progress</span>
        <span class="legend-item"><i class="legend-dot pending"></i> Pending</span>
      </div>

      <div id="trackingResult" class="tracking-result"></div>
    </section>
  </main>

  <div id="stepDetailModal" class="status-modal hidden" aria-hidden="true">
    <div id="stepDetailBackdrop" class="status-modal-backdrop"></div>
    <section class="status-modal-panel" role="dialog" aria-modal="true" aria-labelledby="stepModalTitle">
      <header class="status-modal-header">
        <h3 id="stepModalTitle">Step Detail</h3>
        <button type="button" id="stepDetailClose" aria-label="Close">&times;</button>
      </header>
      <div id="stepDetailBody" class="status-modal-body"></div>
    </section>
  </div>

  <footer id="dynamicFooter"></footer>
</body>
