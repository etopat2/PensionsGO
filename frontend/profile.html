<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#6d1116" />
  <link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png?v=20260430c" />
  <link rel="shortcut icon" href="assets/favicon.ico?v=20260430c" type="image/x-icon" />
    <title>My Profile - PensionsGo</title>

    <!-- ====== Stylesheets ====== -->
    <link rel="stylesheet" href="css/menu.css?v=20260504d" />
    <link rel="stylesheet" href="css/users.css?v=20260504a" />
    <link rel="stylesheet" href="css/auth.css?v=20260504a" />
    <link rel="stylesheet" href="css/styles.css?v=20260612a" />
    <link rel="stylesheet" href="css/overlay.css?v=20260504a" />
    <link rel="stylesheet" href="css/profile.css?v=20260504a" />
</head>

<body>
    <!-- Header will be dynamically inserted by main.js -->

    <div class="profile-main-wrapper">
        <div class="profile-container">
            <div class="page-header">
                <h1>My Profile</h1>
                <p>View and manage your personal information</p>
            </div>

            <div class="profile-card">
                <!-- Profile Header -->
                <div class="profile-card-header">
                    <img id="profileAvatar" src="images/default-user.png" alt="Profile Picture" class="profile-avatar" />
                </div>

                <!-- Profile Details -->
                <div class="profile-card-body">
                    <div class="profile-info">

                        <!-- Full Name + Title + Role -->
                        <div class="profile-info-item name-role-row">
                            <div class="info-icon">&#128100;</div>
                            <div class="info-content">
                                <div class="name-role-container">
                                    <div class="name-section">
                                        <!-- This now dynamically shows the title instead of a static label. -->
                                        <div id="profileTitleLabel" class="info-label">Loading...</div>
                                        <div id="profileName" class="info-value">Loading...</div>
                                    </div>
                                    <div class="role-section">
                                        <div class="info-label">Role</div>
                                        <div id="profileRole" class="info-value">
                                            <span id="roleBadge" class="role-badge">Loading...</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="profile-info-item">
                            <div class="info-icon">&#128231;</div>
                            <div class="info-content">
                                <div class="info-label">Email Address</div>
                                <div id="profileEmail" class="info-value">Loading...</div>
                            </div>
                        </div>

                        <!-- Phone -->
                        <div class="profile-info-item">
                            <div class="info-icon">&#128222;</div>
                            <div class="info-content">
                                <div class="info-label">Phone Number</div>
                                <div id="profilePhone" class="info-value">Loading...</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-directory-card" id="pensionerLookupVisibilityCard" hidden>
                        <div class="profile-directory-head">
                            <div>
                                <div class="info-label">Pensioner Directory Visibility</div>
                                <div id="pensionerLookupVisibilityStatus" class="info-value">Loading...</div>
                                <p id="pensionerLookupVisibilityHelp" class="profile-directory-help">Control whether fellow pensioners can find your contact details in the pensioner directory.</p>
                            </div>
                            <button type="button" id="pensionerLookupVisibilityToggle" class="profile-visibility-toggle" aria-pressed="false" aria-label="Toggle pensioner directory visibility">
                                <span class="profile-visibility-track" aria-hidden="true">
                                    <span class="profile-visibility-thumb"></span>
                                </span>
                                <span class="profile-visibility-text" id="pensionerLookupVisibilityToggleText">Off</span>
                            </button>
                        </div>
                    </div>

                    <!-- Profile Actions -->
                    <div class="profile-actions">
                        <button id="editProfileBtn" class="profile-btn profile-btn-primary">
                            &#9998; Edit Profile
                        </button>
                        <button id="backToDashboardBtn" class="profile-btn profile-btn-secondary">
                            &#8592; Back to Dashboard
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer will be dynamically inserted by main.js -->

    <!-- ====== Scripts ====== -->
    <script src="js/auth_bootstrap.js?v=20260606b"></script>
  <script type="module" src="js/main.js?v=20260612a"></script>
    <script src="js/profile.js"></script>
</body>
</html>
