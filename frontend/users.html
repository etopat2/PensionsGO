<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6d1116" />
  <link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png?v=20260430c" />
  <link rel="shortcut icon" href="assets/favicon.ico?v=20260430c" type="image/x-icon" />

    <!-- Cache Control for Latest Updates -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Users Management - PensionsGo</title>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css?v=20260602b">
    <link rel="stylesheet" href="css/menu.css?v=20260504d">
    <link rel="stylesheet" href="css/color_variables.css?v=20260504a">
    <link rel="stylesheet" href="css/users.css?v=20260504a">
    <link rel="stylesheet" href="css/auth.css?v=20260504a">
    <link rel="stylesheet" href="css/overlay.css?v=20260504a">

    <!-- Scripts -->
    <script src="js/auth_bootstrap.js?v=20260606b"></script>
  <script type="module" src="js/main.js?v=20260609b"></script>
    <script src="js/users.js"></script>
</head>
<body>
    <!-- Header will be dynamically inserted by main.js -->

    <div class="main-wrapper">
        <div class="page-header">
            <h1>Users Management</h1>
            <p>View and manage all registered users in the system</p>
        </div>

        <!-- Filter and Action Controls -->
        <div class="users-controls">
            <div class="filter-section">
                <div class="search-group">
                    <label for="userSearchFilter">Search:</label>
                    <input type="text" id="userSearchFilter" placeholder="Name, email, phone, or role">
                </div>
                <div class="select-filters-row">
                    <div class="select-group">
                        <label for="roleFilter">Role:</label>
                        <select id="roleFilter">
                            <option value="">All Roles</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <label for="accountTypeFilter">Account Type:</label>
                        <select id="accountTypeFilter">
                            <option value="">All Accounts</option>
                            <option value="staff">Staff Only</option>
                            <option value="pensioner">Pensioners Only</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="action-section">
                <button id="clearFilterButton" class="clear-filter-btn">Clear Filter</button>
                <button id="addUserButton" class="add-user-btn">
                    <span style="margin-right: 0.5rem;">+</span> Add User
                </button>
            </div>
        </div>

        <!-- Users Table -->
        <div class="users-table-container">
            <table class="users-table">
                <thead>
                    <tr>
                        <th>Profile</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone No</th>
                        <th>Role</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be dynamically populated by users.js -->
                </tbody>
            </table>
        </div>

        <section class="users-pagination" id="usersPagination" hidden>
            <div class="users-pagination-summary" id="usersPaginationSummary"></div>
            <div class="users-pagination-controls" id="usersPaginationControls"></div>
        </section>
    </div>

    <!-- User Details Modal -->
    <div id="userDetailsModal" class="modal">
        <div class="modal-content user-details-modal-content">
            <button class="close-modal" id="closeUserDetailsModal">&times;</button>
            <div class="modal-header">
                <h2>User Details</h2>
            </div>
            <div class="modal-body" id="userDetailsBody">
                Loading...
            </div>
            <div class="modal-footer" id="userDetailsActions"></div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2>Confirm Deletion</h2>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete user <span id="deleteUserName"></span>?<br>
                <strong>This action cannot be undone.</strong></p>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel">Cancel</button>
                <button class="modal-btn confirm" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Footer will be dynamically inserted by main.js -->
</body>
</html>
