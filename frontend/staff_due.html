<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#6d1116" />
  <link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png?v=20260430c" />
  <link rel="shortcut icon" href="assets/favicon.ico?v=20260430c" type="image/x-icon" />
  <title>Staff Due for Retirement - PensionsGo</title>
  <link rel="stylesheet" href="css/color-variables.css?v=20260602a">
  <link rel="stylesheet" href="css/styles.css?v=20260602b">
  <link rel="stylesheet" href="css/profile.css?v=20260504a">
  <link rel="stylesheet" href="css/menu.css?v=20260504d">
  <link rel="stylesheet" href="css/overlay.css?v=20260504a">
  <link rel="stylesheet" href="css/staff_due.css?v=20260528c">
  <link rel="stylesheet" href="css/staff_workspaces.css?v=20260504b">
</head>
<body>
  <!-- Header dynamically loaded by main.js -->
  <main class="staff-due-wrapper">
    <div class="top-bar">
      <h2>Staff Due for Retirement</h2>
      <div class="top-actions">
        <button id="staffDeleteQueueBtn" class="btn-secondary" style="display:none;">Delete Requests</button>
        <button id="viewQueueBtn" class="btn-secondary">View Queue</button>
        <button id="addStaffBtn" class="btn-add">Add Staff</button>
      </div>
    </div>

    <section class="search-filter-bar">
      <input type="text" id="searchInput" class="staff-due-search-input" placeholder="Search by name or Reg No..." />
      <select id="filterRetirementType" class="staff-due-retirement-filter" data-filterable-select>
        <option value="">All Retirement Types</option>
        <option value="mandatory">Mandatory Retirement</option>
        <option value="early">Early Retirement</option>
        <option value="death">Death</option>
        <option value="aor">Discharge (A.O.R)</option>
        <option value="medical">Discharge (Medical)</option>
        <option value="marriage">Discharge (Marriage)</option>
        <option value="cbe">Discharge (C.B.E)</option>
        <option value="ube">Discharge (U.B.E)</option>
        <option value="public">Discharge (Public Interest)</option>
        <option value="contract">End of Contract</option>
        <option value="tx">Discharge (T.X)</option>
        <option value="voluntary">Voluntary</option>
        <option value="oldAge">Old Age</option>
        <option value="abolition">Abolition of Office</option>
      </select>
      <select id="filterSubmissionStatus" class="staff-due-submission-filter" data-filterable-select>
        <option value="">All Submission Status</option>
        <option value="pending">Pending</option>
        <option value="submitted">Submitted</option>
      </select>
        <select id="filterAppnStatus" class="staff-due-application-filter" data-filterable-select>
          <option value="">All Application Status</option>
          <option value="pending">Pending</option>
          <option value="submitted">Submitted</option>
          <option value="in_process">In Process</option>
          <option value="verified">Verified</option>
          <option value="queried">Queried</option>
          <option value="rejected">Rejected</option>
          <option value="completed">Completed</option>
        </select>
      <button id="searchButton" class="staff-due-search-button">Search</button>
    </section>

    <section id="staffContainer" class="staff-card-grid"></section>
    <section class="staff-pagination" id="staffPagination" hidden>
      <div class="staff-pagination-summary" id="staffPaginationSummary"></div>
      <div class="staff-pagination-controls" id="staffPaginationControls"></div>
    </section>
  </main>

  <div id="actionModal" class="logout-modal-overlay workflow-modal-overlay" style="display:none;">
    <div class="logout-modal action-modal">
      <div class="logout-modal-header">
        <div>
          <h3 id="actionModalTitle">Update Status</h3>
          <p id="actionModalSubtitle">Confirm action for this record.</p>
        </div>
      </div>
      <div id="actionModalBody"></div>
      <div class="modal-actions">
        <button id="actionCancelBtn" class="btn-cancel">Cancel</button>
        <button id="actionConfirmBtn" class="btn-confirm">Confirm</button>
      </div>
    </div>
  </div>

  <div id="queueModal" class="logout-modal-overlay workflow-modal-overlay" style="display:none;">
    <div class="logout-modal queue-modal">
      <div class="queue-modal-header">
        <div>
          <h3>Verified Applications Queue</h3>
          <p>Manage verified applications awaiting OC/Pen authorization.</p>
        </div>
      </div>
      <div class="queue-bulk-actions" id="queueBulkActions" style="display:none;">
        <button id="queueSubmitAllBtn" class="btn-confirm">Submit All to OC/Pen</button>
      </div>
      <div id="queueList" class="queue-list"></div>
      <div class="modal-actions">
        <button id="queueCloseBtn" class="btn-cancel">Close</button>
      </div>
    </div>
  </div>

  <div id="staffDeleteQueueModal" class="logout-modal-overlay workflow-modal-overlay" style="display:none;">
    <div class="logout-modal queue-modal">
      <div class="queue-modal-header">
        <div>
          <h3>Staff Due Delete Requests</h3>
          <p>Approve or reject pending delete requests for staff due records.</p>
        </div>
      </div>
      <div id="staffDeleteQueueList" class="queue-list"></div>
      <div class="modal-actions">
        <button id="staffDeleteQueueCloseBtn" class="btn-cancel">Close</button>
      </div>
    </div>
  </div>

  <!-- Footer dynamically loaded by main.js -->
  <script defer src="js/modules/filterable_select.js?v=20260429a"></script>
  <script type="module" src="js/main.js?v=20260602x"></script>
  <script src="js/modules/retirement-types.js"></script>
  <script src="js/staff_due.js"></script>
</body>
</html>
